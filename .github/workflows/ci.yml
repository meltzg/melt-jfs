name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # Linux exercises the libmtp backend; Windows builds the WPD backend and confirms the
        # fake-backed unit tests pass cross-platform. Neither runner has a physical MTP device.
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3

      # The unit tests inject a FakeLibMTP and never load native libmtp, so no system libraries are
      # needed. Integration tests require a physically connected device, so they are not run here;
      # we compile them (integrationTestClasses) only to ensure they don't bit-rot.
      - name: Run unit tests and compile integration tests
        run: ./gradlew test integrationTestClasses

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/
