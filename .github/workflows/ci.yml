name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install system libraries
        run: |
          sudo apt-get update -q
          # libmtp9       — libmtp.so.9  (MTP device access)
          # libglib2.0-0  — libgobject-2.0.so.0 (GLib, required by libumockdev)
          # libumockdev0  — libumockdev.so.0 (loaded by UMockdevTestbed)
          # umockdev      — libumockdev-preload.so.0 + umockdev-record (LD_PRELOAD for tests)
          sudo apt-get install -y libmtp9 libglib2.0-0 libumockdev0 umockdev

      - uses: gradle/actions/setup-gradle@v3

      - name: Run tests
        run: ./gradlew test

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/
